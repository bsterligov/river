services:
  localstack:
    image: localstack/localstack:4
    ports:
      - "4566:4566"
    environment:
      SERVICES: s3

  s3-init:
    image: amazon/aws-cli
    depends_on:
      localstack:
        condition: service_healthy
    environment:
      AWS_ACCESS_KEY_ID: test
      AWS_SECRET_ACCESS_KEY: test
      AWS_DEFAULT_REGION: us-east-1
    command: s3 mb s3://river-telemetry --endpoint-url http://localstack:4566
    restart: on-failure

  sidecar:
    build:
      context: .
      dockerfile: src/sidecar/Dockerfile
    ports:
      - "4317:4317"
    depends_on:
      localstack:
        condition: service_healthy
    environment:
      AWS_ENDPOINT_URL: http://localstack:4566
      AWS_ACCESS_KEY_ID: test
      AWS_SECRET_ACCESS_KEY: test
      AWS_REGION: us-east-1
      S3_BUCKET: river-telemetry
      SIDECAR_BUFFER_MAX_BYTES: "10485760"
      SIDECAR_FLUSH_INTERVAL_SECS: "10"
    restart: unless-stopped

  clickhouse:
    image: clickhouse/clickhouse-server:26.3
    ports:
      - "8123:8123"
      - "9000:9000"
    environment:
      CLICKHOUSE_DB: river
      CLICKHOUSE_USER: river
      CLICKHOUSE_PASSWORD: river
    healthcheck:
      test: ["CMD", "clickhouse-client", "--user", "river", "--password", "river", "--query", "SELECT 1"]
      interval: 5s
      timeout: 5s
      retries: 10

  victoriametrics:
    image: victoriametrics/victoria-metrics:v1.136.0
    ports:
      - "8428:8428"
    command: -retentionPeriod=30d

  ingestion:
    build:
      context: .
      dockerfile: src/ingestion/Dockerfile
    depends_on:
      localstack:
        condition: service_healthy
      clickhouse:
        condition: service_healthy
      victoriametrics:
        condition: service_started
    environment:
      AWS_ENDPOINT_URL: http://localstack:4566
      AWS_ACCESS_KEY_ID: test
      AWS_SECRET_ACCESS_KEY: test
      AWS_REGION: us-east-1
      S3_BUCKET: river-telemetry
      RIVER_POLL_INTERVAL_SECS: "10"
      VICTORIAMETRICS_URL: http://victoriametrics:8428
      CLICKHOUSE_URL: http://clickhouse:8123
      CLICKHOUSE_DB: river
      CLICKHOUSE_USER: river
      CLICKHOUSE_PASSWORD: river
    restart: unless-stopped

  grafana:
    image: grafana/grafana:13.0.1
    ports:
      - "3000:3000"
    environment:
      GF_AUTH_ANONYMOUS_ENABLED: "true"
      GF_AUTH_ANONYMOUS_ORG_ROLE: Admin
      GF_AUTH_DISABLE_LOGIN_FORM: "true"
      GF_INSTALL_PLUGINS: grafana-clickhouse-datasource
    volumes:
      - ./infra/grafana/provisioning:/etc/grafana/provisioning
      - ./infra/grafana/dashboards:/var/lib/grafana/dashboards
    depends_on:
      - victoriametrics
      - clickhouse

  demo-app:
    build:
      context: src/demo-app
    depends_on:
      - sidecar
    environment:
      OTEL_EXPORTER_OTLP_ENDPOINT: http://sidecar:4317
      OTEL_EXPORTER_OTLP_PROTOCOL: grpc
      OTEL_SERVICE_NAME: demo-app
    restart: on-failure
