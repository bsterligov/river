sonar.projectKey=bsterligov_river
sonar.organization=bsterligov

sonar.sources=src
sonar.exclusions=**/target/**,**/*.pb,src/demo-app/**,src/ui/lib/api/generated/**,src/ui/build/**,**/*_tests.rs,src/ui/test/**,src/ui/macos/**
sonar.sourceEncoding=UTF-8

sonar.tests=src
sonar.test.inclusions=**/*_tests.rs,src/ui/test/**

sonar.coverage.exclusions=src/demo-app/**,src/**/src/main.rs,src/river-sidecar/src/sink.rs,src/ui/lib/api/generated/**

sonar.cpd.exclusions=src/**/src/main.rs,src/ui/lib/api/generated/**,**/*_tests.rs,src/ui/test/**

sonar.rust.lcov.reportPaths=lcov.info
sonar.dart.lcov.reportPaths=src/ui/coverage/lcov.info

# Coverage threshold: > 80% line coverage required for both Rust and Dart code (enforced server-side).
