name: Create Spec from Issue

# On every new issue: create a branch and open a draft PR
# with a pre-filled spec prompt in specs/drafts/.
# Checkout the branch and run /po-spec-writer to generate the real spec.

on:
  issues:
    types: [opened]
  workflow_dispatch:
    inputs:
      issue_number:
        description: GitHub issue number
        required: true
        type: number

jobs:
  create-draft:
    name: Create Draft PR
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write

    steps:
      - uses: actions/checkout@v6

      - uses: jdx/mise-action@v4

      - name: Create draft spec and open PR
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          ISSUE_NUMBER: ${{ github.event.issue.number || inputs.issue_number }}
        run: |
          mise run spec:draft
          mise run spec:publish
