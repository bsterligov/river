name: Spec Workflow

# On new issue: create a spec branch and draft PR with a pre-filled prompt.
# On spec PR merge: create an implementation branch and draft PR.

on:
  issues:
    types: [opened]
  pull_request:
    types: [closed]
    branches: [main]
  workflow_dispatch:
    inputs:
      issue_number:
        description: GitHub issue number
        required: true
        type: number

env:
  MISE_AUTO_INSTALL: false

jobs:
  create-draft:
    name: Create Spec Draft PR
    runs-on: ubuntu-latest
    if: github.event_name == 'issues' || github.event_name == 'workflow_dispatch'
    permissions:
      contents: write
      pull-requests: write

    steps:
      - uses: actions/checkout@v6

      - uses: jdx/mise-action@v4
        with:
          install: false

      - name: Create draft spec and open PR
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          ISSUE_NUMBER: ${{ github.event.issue.number || inputs.issue_number }}
        run: |
          mise run spec:draft
          mise run spec:publish

  create-impl-draft:
    name: Create Implementation Draft PR
    runs-on: ubuntu-latest
    if: |
      github.event_name == 'pull_request' &&
      github.event.pull_request.merged == true &&
      startsWith(github.event.pull_request.head.ref, 'spec/')
    permissions:
      contents: write
      pull-requests: write

    steps:
      - uses: actions/checkout@v6

      - uses: jdx/mise-action@v4
        with:
          install: false

      - name: Create implementation branch and draft PR
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          SPEC_BRANCH: ${{ github.event.pull_request.head.ref }}
        run: mise run spec:impl
