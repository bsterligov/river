name: Release

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  version:
    name: Calculate Version
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.version.outputs.version }}

    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - uses: jdx/mise-action@v4

      - name: calculate version
        id: version
        run: |
          VERSION=$(mise run release:version)
          echo "version=$VERSION" >> $GITHUB_OUTPUT

  quality:
    name: Run Lint & Tests
    runs-on: ubuntu-latest
    needs: version

    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - uses: jdx/mise-action@v4
        with:
          cache: false
  
      - name: fmt check
        run: mise run cargo:fmt-check

      - name: clippy
        run: mise run cargo:clippy

      - name: coverage
        run: mise run cargo:coverage

      - uses: actions/upload-artifact@v7
        with:
          name: lcov
          path: lcov.info
          retention-days: 1

  sonarqube:
    name: Run SonarQube
    runs-on: ubuntu-latest
    needs: [version, quality]

    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - uses: actions/download-artifact@v4
        with:
          name: lcov

      - name: SonarQube Scan
        uses: SonarSource/sonarqube-scan-action@v8
        with:
          args: >-
            -Dsonar.qualitygate.wait=true
            -Dsonar.projectVersion=${{ needs.version.outputs.version }}
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}

  release:
    name: Create Release
    runs-on: ubuntu-latest
    needs: [quality, version]
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: configure git
        run: |
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git config user.name "github-actions[bot]"

      - uses: jdx/mise-action@v4

      - run: mise run release:publish
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          RELEASE_VERSION: ${{ needs.version.outputs.version }}
