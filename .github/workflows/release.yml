name: Release

on:
  push:
    branches: [main]
    paths:
      - 'src/**'
      - '.mise/**'
      - 'sonar-project.properties'

env:
  MISE_AUTO_INSTALL: false

jobs:
  version:
    name: Calculate Version
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.version.outputs.version }}

    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - uses: jdx/mise-action@v4
        with:
          install_args: cocogitto

      - name: calculate version
        id: version
        run: |
          VERSION=$(mise run ci:release-version)
          echo "version=$VERSION" >> $GITHUB_OUTPUT

  rust-quality:
    name: Run Rust Lint & Tests
    runs-on: ubuntu-latest
    needs: version

    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - uses: jdx/mise-action@v4
        with:
          cache: false
          install_args: rust

      - name: fmt check
        run: mise run ci:cargo-fmt-check

      - name: clippy
        run: mise run ci:cargo-clippy

      - name: test
        run: mise run ci:cargo-test

  flutter-quality:
    name: Run Flutter Tests
    runs-on: ubuntu-latest
    needs: version

    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - uses: jdx/mise-action@v4
        with:
          install_args: flutter

      - name: flutter test
        run: mise run ci:flutter-test

  release:
    name: Create Release
    runs-on: ubuntu-latest
    needs: [rust-quality, flutter-quality, version]
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: configure git
        run: |
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git config user.name "github-actions[bot]"

      - uses: jdx/mise-action@v4
        with:
          install_args: cocogitto

      - run: mise run ci:release-publish
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          RELEASE_VERSION: ${{ needs.version.outputs.version }}
