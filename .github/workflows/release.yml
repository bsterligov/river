name: Release

on:
  push:
    branches: [main]
    paths:
      - 'src/**'
      - '/mise/**'
      - 'sonar-project.properties'

env:
  MISE_AUTO_INSTALL: false

jobs:
  version:
    name: Calculate Version
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.version.outputs.version }}

    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - uses: jdx/mise-action@v4
        with:
          install_args: cocogitto

      - name: calculate version
        id: version
        run: |
          VERSION=$(mise run release:version)
          echo "version=$VERSION" >> $GITHUB_OUTPUT

  rust-quality:
    name: Run Rust Lint & Tests
    runs-on: ubuntu-latest
    needs: version

    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - uses: jdx/mise-action@v4
        with:
          cache: false
          install_args: rust cargo:cargo-llvm-cov

      - name: fmt check
        run: mise run cargo:fmt-check

      - name: clippy
        run: mise run cargo:clippy

      - name: coverage
        run: mise run cargo:coverage

      - uses: actions/upload-artifact@v7
        with:
          name: lcov
          path: lcov.info
          retention-days: 1

  flutter-quality:
    name: Run Flutter Tests
    runs-on: ubuntu-latest
    needs: version

    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - uses: jdx/mise-action@v4
        with:
          install_args: flutter

      - name: flutter coverage
        run: mise run flutter:coverage

      - uses: actions/upload-artifact@v7
        with:
          name: flutter-lcov
          path: src/ui/coverage/lcov.info
          retention-days: 1

  sonarqube:
    name: Run SonarQube
    runs-on: ubuntu-latest
    needs: [version, rust-quality, flutter-quality]

    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - uses: jdx/mise-action@v4
        with:
          install_args: flutter

      - name: set flutter sdk path
        run: echo "FLUTTER_SDK=$(mise where flutter)" >> $GITHUB_ENV

      - uses: actions/download-artifact@v4
        with:
          name: lcov

      - uses: actions/download-artifact@v4
        with:
          name: flutter-lcov
          path: src/ui/coverage

      - name: SonarQube Scan
        uses: SonarSource/sonarqube-scan-action@v8
        with:
          args: >-
            -Dsonar.qualitygate.wait=true
            -Dsonar.projectVersion=${{ needs.version.outputs.version }}
            -Dsonar.flutter.sdk.path=${{ env.FLUTTER_SDK }}
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}

  release:
    name: Create Release
    runs-on: ubuntu-latest
    needs: [rust-quality, flutter-quality, version]
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: configure git
        run: |
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git config user.name "github-actions[bot]"

      - uses: jdx/mise-action@v4
        with:
          install_args: cocogitto

      - run: mise run release:publish
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          RELEASE_VERSION: ${{ needs.version.outputs.version }}
