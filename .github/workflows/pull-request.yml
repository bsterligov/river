name: Pull Request

on:
  pull_request:
    types: [opened, synchronize, reopened, ready_for_review]

concurrency:
  group: pull-request-${{ github.event.pull_request.number }}
  cancel-in-progress: true

env:
  MISE_AUTO_INSTALL: false

jobs:
  rust-quality:
    name: Run Rust Lint & Tests
    runs-on: ubuntu-latest
    if: ${{ !github.event.pull_request.draft && !startsWith(github.head_ref, 'spec/') }}

    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - uses: jdx/mise-action@v4
        with:
          cache: false
          install_args: rust

      - name: fmt check
        run: mise run ci:cargo-fmt-check

      - name: clippy
        run: mise run ci:cargo-clippy

      - name: test
        run: mise run ci:cargo-test

  flutter-quality:
    name: Run Flutter Tests
    runs-on: ubuntu-latest
    if: ${{ !github.event.pull_request.draft && !startsWith(github.head_ref, 'spec/') }}

    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - uses: jdx/mise-action@v4
        with:
          install_args: flutter

      - name: flutter test
        run: mise run ci:flutter-test
